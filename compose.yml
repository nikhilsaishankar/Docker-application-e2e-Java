version: "3.9"
services:
  devopsdb:
    image: nikhilkotharu/dockerapp:db
    ports:
      - "3306:3306"
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: '1024m'
        reservations:
          cpus: '0.5'
          memory: '512m'
    networks:
      - mynetwork
    volumes:
      - db_volume:/opt/nikhil

  application:
    image: nikhilkotharu/dockerapp:app
    ports:
      - "1111:8080"
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: '1024m'
        reservations:
          cpus: '0.5'
          memory: '512m'
    depends_on:
      - devopsdb
    networks:
      - mynetwork
    volumes:
      - app_volume:/opt/nikhil

networks:
  mynetwork:
    driver: overlay

volumes:
  db_volume:
  app_volume:
